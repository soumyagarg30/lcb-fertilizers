version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: agriflow
      POSTGRES_USER: agriflow
      POSTGRES_PASSWORD: agriflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn backend_fastapi.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:
